<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Screenity - Recorder</title>
    <style>
      @font-face {
        font-family: Satoshi-Light;
        src: url(chrome-extension://__MSG_@@extension_id__/assets/fonts/Satoshi-Light.ttf)
          format("truetype");
        font-weight: normal;
        font-style: normal;
      }

      @font-face {
        font-family: Satoshi-Medium;
        src: url(chrome-extension://__MSG_@@extension_id__/assets/fonts/Satoshi-Medium.ttf)
          format("truetype");
        font-weight: normal;
        font-style: normal;
      }

      @font-face {
        font-family: Satoshi-Bold;
        src: url(chrome-extension://__MSG_@@extension_id__/assets/fonts/Satoshi-Bold.ttf)
          format("truetype");
        font-weight: normal;
        font-style: normal;
      }
      body {
        font-family: Satoshi-Medium;
      }
    </style>
    <!--
      Webpack injects two <script defer> tags (chunks: ["recorderkeepalive",
      "recorder"], chunksSortMode: "manual"):
        1. recorderkeepalive.bundle.js: audio oscillator + Web Locks +
           mediaSession signals to prevent hidden-tab throttling.
        2. recorder.bundle.js: the React app.
      Both deferred; document-order execution keeps signals in place
      before the recorder bundle parses.
    -->
  </head>

  <body>
    <div id="app-container"></div>
  </body>
</html>
